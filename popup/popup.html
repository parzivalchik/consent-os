<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consent-os2.0 - Privacy Dashboard</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app dashboard">
    <header class="header">
      <div class="header-brand">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="header-text">
          <h1>Consent-os2.0</h1>
          <span class="tagline">Your Privacy Dashboard</span>
        </div>
      </div>
      <nav class="header-nav">
        <button class="nav-btn" id="open-dashboard-btn" title="Open Full Dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </button>
        <button class="nav-btn" id="refresh-btn" title="Refresh Data">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6M1 20v-6h6"/>
            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
          </svg>
        </button>
        <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">
          <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </button>
      </nav>
    </header>

    <div class="score-bar">
      <div class="score-item">
        <div class="score-label">Privacy Score</div>
        <div class="score-value">
          <span id="privacy-score">--</span>
          <span class="score-max">/100</span>
        </div>
        <div class="score-bar-visual">
          <div class="score-bar-fill" id="score-bar-fill"></div>
        </div>
      </div>
      <div class="stat-divider"></div>
      <div class="score-item mini">
        <span class="mini-value" id="stat-domains">0</span>
        <span class="mini-label">Domains</span>
      </div>
      <div class="score-item mini">
        <span class="mini-value" id="stat-cookies">0</span>
        <span class="mini-label">Cookies</span>
      </div>
      <div class="score-item mini">
        <span class="mini-value" id="stat-history">0</span>
        <span class="mini-label">History</span>
      </div>
    </div>

    <div class="charts-section">
      <div class="chart-card">
        <div class="chart-title">Data by Category</div>
        <div class="chart-container">
          <canvas id="category-chart"></canvas>
        </div>
        <div class="chart-legend" id="category-legend"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Risk Breakdown</div>
        <div class="chart-container">
          <canvas id="risk-chart"></canvas>
        </div>
        <div class="risk-summary">
          <div class="risk-item">
            <span class="risk-dot high"></span>
            <span>High: <strong id="risk-high-count">0</strong></span>
          </div>
          <div class="risk-item">
            <span class="risk-dot medium"></span>
            <span>Medium: <strong id="risk-medium-count">0</strong></span>
          </div>
          <div class="risk-item">
            <span class="risk-dot low"></span>
            <span>Low: <strong id="risk-low-count">0</strong></span>
          </div>
        </div>
      </div>
    </div>

    <div class="permissions-header">
      <div class="permissions-title">
        <h2>Active Permissions</h2>
        <span class="permissions-count" id="permissions-count">0 services</span>
      </div>
      <div class="bulk-actions">
        <label class="checkbox-label">
          <input type="checkbox" id="select-all">
          <span>Select All</span>
        </label>
        <button class="btn btn-sm btn-ghost" id="export-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export
        </button>
        <button class="btn btn-sm btn-danger" id="revoke-all-btn" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
          Revoke Selected
        </button>
      </div>
    </div>

    <main class="main-content">
      <div class="services-list" id="services-list">
        <div class="loading-state">
          <div class="spinner"></div>
          <span>Scanning browser data...</span>
        </div>
      </div>
    </main>

    <aside class="detail-panel" id="detail-panel">
      <div class="detail-header">
        <button class="back-btn" id="back-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <div class="detail-header-content" id="detail-header-content"></div>
      </div>
      <div class="detail-body" id="detail-body"></div>
      <div class="detail-footer" id="detail-footer"></div>
    </aside>

    <div class="modal-overlay" id="modal-overlay">
      <div class="modal" id="revoke-modal">
        <div class="modal-header">
          <h3 id="modal-title">Confirm Action</h3>
          <button class="modal-close" id="modal-close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="modal-icon" id="modal-icon"></div>
          <p class="modal-message" id="modal-message"></p>
          <p class="modal-submessage" id="modal-submessage"></p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
          <button class="btn btn-primary" id="modal-confirm">Confirm</button>
        </div>
      </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
